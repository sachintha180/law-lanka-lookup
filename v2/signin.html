<!DOCTYPE html>
<html lang="en">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Sign in | L3</title>
</head>

<body>
  <main>
    <section id="signin">
      <h2>Sign in</h2>
      <form>
        <label for="email">Email Address</label>
        <input type="email" required autocomplete="email">

      </form>
    </section>
  </main>
